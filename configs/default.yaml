# CrackFM default configuration.
# Override any field from the CLI, e.g.:
#   python -m crackfm.train data.root=./data/crack500 model.name=unet trainer.epochs=30

seed: 42
device: auto          # auto | cpu | cuda

data:
  root: ./data/crack500     # expects images/ and masks/ subfolders
  image_size: 448
  val_split: 0.15
  batch_size: 8
  num_workers: 4
  binarize_threshold: 127   # mask pixels > threshold => crack

model:
  name: unet                # unet | sam2_lora
  in_channels: 3
  base_channels: 32
  # --- sam2_lora only ---
  sam2_checkpoint: null
  sam2_config: sam2_hiera_s.yaml
  lora_rank: 8
  lora_alpha: 16
  freeze_image_encoder: true

prompting:
  enabled: false            # geometry-adaptive prompting (used by sam2_lora)
  n_points: 24
  strategy: curvature       # uniform | curvature
  neg_points: 8
  per_component_box: true

loss:
  dice: 1.0
  bce: 0.5
  boundary: 0.25
  tversky_beta: 0.7

trainer:
  epochs: 30
  lr: 3.0e-4
  weight_decay: 1.0e-4
  amp: true
  grad_clip: 1.0
  out_dir: runs
  log_every: 20
  save_best_metric: f1      # iou | dice | f1

eval:
  boundary_tolerance: 2     # px tolerance for boundary-F (ODS/OIS style)

severity:
  mm_per_pixel: null        # set for real-world width in mm; else width in px
  width_thresholds: [1.0, 3.0]   # severity class boundaries (in mm or px)

tracking:
  backend: auto             # auto | wandb | none
  project: crackfm
  run_name: null
